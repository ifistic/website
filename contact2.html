<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Form</title>
</head>
<body>
  <h1>Contact Us</h1>
  <form id="contact-form">
    <input type="text" name="name" placeholder="Your Name" required /><br />
    <input type="email" name="email" placeholder="Your Email" required /><br />
    <textarea name="message" placeholder="Your Message" required></textarea><br />
    <button type="submit">Send</button>
  </form>
  <p id="response"></p>

  <script>
    const form = document.getElementById('contact-form');
    const responseEl = document.getElementById('response');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const data = {
        name: form.name.value,
        email: form.email.value,
        message: form.message.value,
      };

      try {
        const res = await fetch('https://ifiokwebsite.s3.ap-south-1.amazonaws.com/contact.html', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data),
        });

        const result = await res.json();
        responseEl.textContent = result.message || 'Thanks for reaching out!';
        form.reset();
      } catch (err) {
        responseEl.textContent = 'There was an error sending your message.';
        console.error(err);
      }
    });
  </script>
</body>
</html>
