<!DOCTYPE html>
<html>
<head>
  <style>
    input[type=text], input[type=email], input[type=number] {
      width: 20%;
      padding: 12px 20px;
      margin: 5px 0;
      display: block;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    textarea {
      width: 50%;
      height: 120px;
      padding: 12px 20px;
      margin: 8px 0;
      border: 1px solid #ccc;
      border-radius: 4px;
      display: block;
    }

    button {
      width: 120px;
      background-color: #4CAF50;
      color: white;
      padding: 12px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    button:hover {
      background-color: #45a049;
    }

    #msg {
      margin-top: 10px;
      font-weight: bold;
    }
  </style>
</head>

<body style="background-color:powderblue;">
  <h3>Submit your form</h3>

  <form id="contact-form">
    <input name="first_name" placeholder="First Name" required>
    <input name="last_name" placeholder="Last Name" required>
    <input name="address" placeholder="Address" required>
    <input name="email" type="email" placeholder="Email" required>
    <input name="phone_number" placeholder="Phone Number" required>
    <input name="country" placeholder="Country" required>

    <textarea name="message" placeholder="Message" required></textarea>

    <button type="submit">Submit</button>
  </form>

  <div id="msg"></div>
  <div id="message-box"></div>

  <!-- Supabase Script -->
  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"

    const supabase = createClient(
      "https://eijrmhfnuaeurhzeibip.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVpanJtaGZudWFldXJoemVpYmlwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1NTg2MzAsImV4cCI6MjA5MzEzNDYzMH0.MUb9yJwli4lr85t3864PfoTqEHiGZFS8nypKxzfkjHg"
    )

     const form = document.getElementById("contact-form")
  const msg = document.getElementById("msg")

  function showMessage(text, color) {
    msg.innerText = text
    msg.style.color = color
  }

  function isOffline() {
    return !navigator.onLine
  }

  function clean(v) {
    return v ? v.trim() : ""
  }

  // ✅ FIX: function is INCLUDED here (this was your error)
  function getValue(name) {
    const field = form.querySelector(`[name="${name}"]`)
    return field ? clean(field.value) : ""
  }

  form.addEventListener("submit", async (e) => {
    e.preventDefault()

    try {
      if (isOffline()) {
        throw new Error("You are offline. Check your internet connection.")
      }

      const data = {
        first_name: getValue("first_name"),
        last_name: getValue("last_name"),
        address: getValue("address"),
        email: getValue("email"),
        phone_number: getValue("phone_number"),
        country: getValue("country"),
        message: getValue("message")
      }

      // 🔴 validation
      for (const [key, value] of Object.entries(data)) {
        if (!value) {
          throw new Error(`${key.replace("_", " ")} is required`)
        }
      }

      if (!/^\S+@\S+\.\S+$/.test(data.email)) {
        throw new Error("Invalid email format")
      }

      if (isNaN(data.phone_number)) {
        throw new Error("Phone number must be numeric")
      }

      if (data.message.length < 10) {
        throw new Error("Message must be at least 10 characters")
      }

      // 🔵 insert
      const { error } = await supabase
        .from("contacts")
        .insert([data])

      if (error) {
        throw new Error(error.message)
      }

      showMessage("Message sent successfully!", "green")
      form.reset()

    } catch (err) {
      console.error(err)
      showMessage("Error: " + err.message, "red")
    }
  })
</script>

</body>
</html>
